<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>alejandro ramírez</title>

<style>
html, body{
    margin:0;
    height:100%;
}

body{
    background:#d6d6c9;
    color:#242421;
    font-family:Helvetica, Arial, sans-serif;
}

main{

    height:100vh;

    padding:85px;

    display:grid;

    grid-template-columns:1fr auto;

    grid-template-rows:auto 1fr auto;

}

.identity{
    grid-column:1;
    grid-row:1;
}

.identity h1{

    margin:0;

    font-size:30px;

    font-weight:300;

}

.identity p{

    margin-top:12px;

    font-size:19px;

    letter-spacing:.08em;

    opacity:.45;

}

nav{

    grid-column:1;

    grid-row:2;

    align-self:start;

    margin-top:90px;

}

nav a{

    display:block;

    margin:14px 0;

    font-size:20px;

    color:inherit;

    text-decoration:none;

    opacity:.7;

    transition:opacity .25s;

}

nav a:hover{

    opacity:1;

}

#hello{

    grid-column:2;
    grid-row:1;

    justify-self:end;

    margin-top:12px;

    font-size:18px;

    letter-spacing:.04em;

    color:inherit;

    text-decoration:none;

    opacity:.45;

    transition:.25s;
}

#hello:hover{

    opacity:1;

}

#cinema{

    grid-column:1;

    grid-row:3;

    align-self:end;

    justify-self:start;

    margin-bottom:10px;

    letter-spacing:1em;

    font-size:20px;

    color:inherit;

    text-decoration:none;

    opacity:.55;
}

#cinema:hover{

    opacity:1;

}
</style>

</head>

<body>

<main>
<div class="identity">

    <h1>alejandro ramírez</h1>

    <p>Filmmaker · Cook</p>

</div>

<a id="hello" href="mailto:info@alejandroramirez.info">

    Say Hello

</a>

<nav>

    <a href="#">images</a>

    <a href="#">journal</a>

    <a href="#">kitchen</a>

</nav>

<a id="cinema" href="index.html">
    cinema
</a>

</main>

</body>
</html>
