<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>alejandro ramírez</title>


<style>

html,
body{
    margin:0;
    height:100%;
}

body{

    background:#d6d6c9;
    color:#242421;

    font-family:Helvetica, Arial, sans-serif;

}

main{

    position:relative;

    width:100%;
    height:100vh;

    box-sizing:border-box;

}

/* ---------- Identity ---------- */

.identity{

    position:absolute;

    left:85px;
    top:70px;

}

.identity h1{

    margin:0;

    font-size:25px;
    font-weight:300;

}

.identity p{

    margin-top:12px;

    font-size:23px;

    letter-spacing:.12em;

    opacity:.35;

}

/* ---------- Navigation ---------- */

nav{

    position:absolute;

    left:85px;
    top:220px;

}

nav a{

    display:block;

    margin:14px 0;

    font-size:23px;

    color:inherit;

    text-decoration:none;

    opacity:.60;

    transition:opacity .25s;

}

nav a:hover{

    opacity:1;

}

/* ---------- Say Hello ---------- */

#hello{

    position:absolute;

    top:75px;
    right:85px;

    font-size:18px;

    color:inherit;

    text-decoration:none;

    opacity:.60;

    transition:opacity .25s;

}

#hello:hover{

    opacity:1;

}

/* ---------- Cinema ---------- */

#cinema{

    position:absolute;

    left:85px;
    top:560px;

    font-size:23px;

    color:inherit;

    text-decoration:none;

    opacity:.55;

    transition:opacity .25s;

    display:flex;

    gap:.55em;

}

#cinema:hover{

    opacity:1;
}

#cinema span{

    animation: rgbLoop 8s linear infinite;

}
#cinema span:nth-child(1){
    animation-delay:0s;
}

#cinema span:nth-child(2){
    animation-delay:2.5s;
}

#cinema span:nth-child(3){
    animation-delay:5s;
}

#cinema span:nth-child(4){
    animation-delay:7.5s;
}

#cinema span:nth-child(5){
    animation-delay:10s;
}

#cinema span:nth-child(6){
    animation-delay:12.5s;
}
@keyframes rgbLoop{

    0%{
        color:#242421;
    }

    8%{
        color:#ff4040;
    }

    16%{
        color:#3bd44a;
    }

    24%{
        color:#3b82ff;
    }

    32%{
        color:#242421;
    }

    100%{
        color:#242421;
    }

}

</style>

</head>

<body>

<main>
<div class="identity">

    <h1>alejandro ramírez</h1>

    <p>Filmmaker · Cook</p>

</div>

<a id="hello" href="mailto:info@alejandroramirez.info">

    Say Hello

</a>

<nav>

    <a href="#">images</a>

    <a href="#">journal</a>

    <a href="#">kitchen</a>

</nav>

<a id="cinema" href="index.html">

    <span>c</span>
    <span>i</span>
    <span>n</span>
    <span>e</span>
    <span>m</span>
    <span>a</span>

</a>

</main>

</body>
</html>
